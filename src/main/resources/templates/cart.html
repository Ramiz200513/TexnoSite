<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Корзина</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light py-5">
<div class="container">
    <h2 class="mb-4"><i class="bi bi-cart-check"></i> Оформление заказа</h2>

    <div th:if="${cartItems.isEmpty()}" class="card border-0 shadow-sm p-5 text-center rounded-5">
        <i class="bi bi-cart-x display-1 text-muted"></i>
        <h3 class="mt-3">Корзина пуста</h3>
        <a href="/products" class="btn btn-primary mt-3 rounded-pill">За покупками</a>
    </div>

    <div th:unless="${cartItems.isEmpty()}" class="card border-0 shadow-sm p-4 rounded-4">
        <table class="table align-middle">
            <thead><tr><th>Товар</th><th>Цена</th><th class="text-center">Удалить</th></tr></thead>
            <tbody>
            <tr th:each="item, iter : ${cartItems}">
                <td th:text="${item.name}" class="fw-bold"></td>
                <td th:text="${#numbers.formatDecimal(item.price, 1, 'WHITESPACE', 0, 'POINT')} + ' $'"></td>
                <td class="text-center">
                    <a th:href="@{'/cart/remove/' + ${iter.index}}" class="btn btn-link text-danger" onclick="return confirm('Удалить из корзины?')">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
        <div class="text-end mt-4">
            <h4>Итого: <span class="text-primary fw-bold" th:text="${#numbers.formatDecimal(totalPrice, 1, 'WHITESPACE', 0, 'POINT')} + ' $'"></span></h4>
            <a href="/checkout" class="btn btn-success btn-lg rounded-pill px-5 mt-2">Оформить <i class="bi bi-arrow-right"></i></a>
        </div>
    </div>
</div>
</body>
</html>
