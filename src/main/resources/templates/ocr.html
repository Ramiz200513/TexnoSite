<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AI Scanner | ELECTRO</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f0f2f5; font-family: 'Inter', sans-serif; }
        .result-box { min-height: 200px; background: white; border-radius: 15px; border: 1px solid #dee2e6; padding: 15px; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card border-0 shadow-lg rounded-4 p-4">
                <h2 class="fw-bold mb-4 text-primary"><i class="bi bi-eye-fill"></i> AI OCR Сканер</h2>

                <div class="input-group mb-4">
                    <input type="file" class="form-control" id="imageFile">
                    <button class="btn btn-primary px-4 fw-bold" onclick="startProcess()" id="processBtn">
                        <i class="bi bi-lightning-fill"></i> СКАНИРОВАТЬ
                    </button>
                </div>

                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="badge bg-secondary">ОРИГИНАЛ (OCR)</span>
                            <button class="btn btn-sm btn-outline-dark" onclick="speak('originalText')">
                                <i class="bi bi-volume-up-fill"></i> Озвучить
                            </button>
                        </div>
                        <div id="originalText" class="result-box">Здесь появится текст с картинки...</div>
                    </div>

                    <div class="col-md-6">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="badge bg-primary">AI ПЕРЕВОД (Ollama)</span>
                            <button class="btn btn-sm btn-outline-primary" onclick="speak('translatedText')">
                                <i class="bi bi-volume-up-fill"></i> Озвучить
                            </button>
                        </div>
                        <div id="translatedText" class="result-box">Здесь появится перевод...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function startProcess() {
        const fileInput = document.getElementById('imageFile');
        const btn = document.getElementById('processBtn');
        if (fileInput.files.length === 0) return alert("Сначала выбери картинку!");

        // Визуальный эффект загрузки
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Думаю...';

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);

        try {
            // Стучимся в твой OcrController
            const response = await fetch('/api/ocr/process', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();

            document.getElementById('originalText').innerText = data.original;
            document.getElementById('translatedText').innerText = data.translated;
        } catch (error) {
            alert("Ошибка! Проверь запущен ли Tesseract и Ollama.");
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-lightning-fill"></i> СКАНИРОВАТЬ';
        }
    }

    // Функция озвучивания (Text-to-Speech)
    function speak(elementId) {
        const text = document.getElementById(elementId).innerText;
        if (text.length < 5) return;

        const utterance = new SpeechSynthesisUtterance(text);
        // Если id перевода - читаем на русском, иначе на английском
        utterance.lang = (elementId === 'translatedText') ? 'ru-RU' : 'en-US';
        window.speechSynthesis.speak(utterance);
    }
</script>
</body>
</html>
