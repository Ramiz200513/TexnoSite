<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${item.name} + ' | ELECTRO'"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .product-container { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; margin-top: 50px; }
        .img-zoom-container { padding: 40px; background: #fff; display: flex; align-items: center; justify-content: center; }
        .product-img { max-height: 500px; object-fit: contain; transition: transform 0.3s ease; }
        .product-img:hover { transform: scale(1.02); }
        .badge-cat { background: #e9ecef; color: #495057; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; font-size: 0.75rem; padding: 8px 15px; }
        .price-tag { font-size: 2.5rem; font-weight: 800; color: #0d6efd; }
        .btn-buy { border-radius: 50px; padding: 12px 40px; font-weight: 700; transition: all 0.3s; }
        .btn-buy:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3); }
        .spec-box { background: #f8f9fa; border-radius: 12px; padding: 20px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container pb-5">
    <nav aria-label="breadcrumb" class="pt-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/products" class="text-decoration-none">Магазин</a></li>
            <li class="breadcrumb-item active" th:text="${item.category}"></li>
        </ol>
    </nav>

    <div class="row product-container">
        <div class="col-lg-6 img-zoom-container border-end">
            <img th:src="${item.imageUrl}" class="img-fluid product-img" alt="Product Image">
        </div>

        <div class="col-lg-6 p-5 d-flex flex-column">
            <div>
                <span class="badge badge-cat mb-3" th:text="${item.category}">Категория</span>
                <h1 class="fw-bold mb-3" th:text="${item.name}">Название товара</h1>

                <div class="d-flex align-items-center mb-4">
                    <div class="text-warning me-2">
                        <i class="bi bi-star-fill"></i>
                        <i class="bi bi-star-fill"></i>
                        <i class="bi bi-star-fill"></i>
                        <i class="bi bi-star-fill"></i>
                        <i class="bi bi-star-half"></i>
                    </div>
                    <span class="text-muted small">(4.5 / 5 на основе отзывов)</span>
                </div>

                <div class="price-tag mb-4">
                    <span th:text="${#numbers.formatDecimal(item.price, 1, 'WHITESPACE', 0, 'POINT')}"></span>
                    <small style="font-size: 1.5rem">$</small>
                </div>

                <p class="text-secondary leading-relaxed" th:text="${item.description}">
                    Описание товара здесь...
                </p>

                <div class="spec-box">
                    <div class="row g-3">
                        <div class="col-6">
                            <small class="text-muted d-block">Доставка</small>
                            <strong>Бесплатно в Астане</strong>
                        </div>
                        <div class="col-6">
                            <small class="text-muted d-block">Гарантия</small>
                            <strong>12 месяцев</strong>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-auto pt-5">
                <div th:if="${user != null}" class="d-grid gap-2 d-md-flex">
                    <a th:href="@{'/cart/add/' + ${item.id}}" class="btn btn-primary btn-lg btn-buy">
                        <i class="bi bi-cart-plus me-2"></i> Добавить в корзину
                    </a>
                    <a href="/cart" class="btn btn-outline-secondary btn-lg rounded-pill">
                        <i class="bi bi-bag-check"></i>
                    </a>
                </div>

                <div th:if="${user == null}" class="alert alert-light border d-flex align-items-center rounded-4">
                    <i class="bi bi-info-circle-fill text-primary me-3 fs-4"></i>
                    <span>Пожалуйста, <a href="#" data-bs-toggle="modal" data-bs-target="#loginModal" class="fw-bold">войдите</a>, чтобы совершить покупку.</span>
                </div>

                <a href="/products" class="btn btn-link text-muted mt-3 p-0 text-decoration-none">
                    <i class="bi bi-arrow-left"></i> Вернуться к списку товаров
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
