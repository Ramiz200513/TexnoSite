<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Панель администратора | ELECTRO</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
        .nav-tabs .nav-link { border: none; font-weight: 600; color: #6c757d; }
        .nav-tabs .nav-link.active { color: #0d6efd; border-bottom: 3px solid #0d6efd; background: none; }
        .admin-card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .filter-section { background: #fff; border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #eee; }
        .form-label-sm { font-size: 0.75rem; font-weight: 700; color: #6c757d; text-transform: uppercase; margin-bottom: 4px; display: block; }

        /* Анимация для удаления строк */
        .fade-out { opacity: 0; transform: translateX(20px); transition: all 0.3s ease; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold"><i class="bi bi-gear-fill text-primary"></i> Панель управления</h3>
        <a href="/products" class="btn btn-outline-secondary btn-sm rounded-pill px-4">
            <i class="bi bi-shop me-1"></i> В магазин
        </a>
    </div>

    <ul class="nav nav-tabs mb-4" id="adminTab" role="tablist">
        <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#products-tab"><i class="bi bi-box-seam me-1"></i> Товары</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#orders-tab"><i class="bi bi-receipt me-1"></i> Заказы</button>
        </li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="products-tab">
            <div class="row">
                <div class="col-lg-4 mb-4">
                    <div class="card admin-card p-4 sticky-top" style="top: 20px;">
                        <h5 class="fw-bold mb-3">Новый товар</h5>
                        <form id="addProductForm">
                            <div class="mb-2">
                                <label class="form-label-sm">Название</label>
                                <input type="text" name="name" class="form-control" placeholder="Напр: iPhone 15" required>
                            </div>
                            <div class="mb-2">
                                <label class="form-label-sm">Цена ($)</label>
                                <input type="number" step="100" min="0" name="price" class="form-control" required>
                            </div>
                            <div class="mb-2">
                                <label class="form-label-sm">Категория</label>
                                <input type="text" name="category" class="form-control" placeholder="Электроника">
                            </div>
                            <div class="mb-2">
                                <label class="form-label-sm">Изображение</label>
                                <input type="file" name="imageFile" class="form-control">
                            </div>
                            <div class="mb-3">
                                <div class="d-flex justify-content-between">
                                    <label class="form-label-sm">Описание</label>
                                    <button type="button" class="btn btn-sm btn-link text-decoration-none py-0" onclick="generateDescription()">
                                        <i class="bi bi-magic text-warning"></i> ИИ Генерация
                                    </button>
                                </div>
                                <textarea name="description" id="descField" class="form-control" rows="3"></textarea>
                            </div>
                            <button type="submit" id="submitBtn" class="btn btn-primary w-100 rounded-pill fw-bold">
                                <span id="btnText"><i class="bi bi-plus-circle me-1"></i> Сохранить</span>
                                <span id="btnSpinner" class="spinner-border spinner-border-sm d-none"></span>
                            </button>
                        </form>
                    </div>
                </div>

                <div class="col-lg-8">
                    <div class="filter-section shadow-sm">
                        <form action="/admin" method="get" class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label-sm">Поиск по названию</label>
                                <input type="text" name="keyword" th:value="${keyword}" class="form-control form-control-sm">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label-sm">Категория</label>
                                <select name="category" class="form-select form-select-sm">
                                    <option value="">Все категории</option>
                                    <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}" th:selected="${cat == selectedCat}"></option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label-sm">Цена ($)</label>
                                <div class="input-group input-group-sm">
                                    <input type="number" name="minPrice" th:value="${minPrice}" class="form-control" placeholder="От">
                                    <input type="number" name="maxPrice" th:value="${maxPrice}" class="form-control" placeholder="До">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label-sm">Сортировать по</label>
                                <select name="sort" class="form-select form-select-sm">
                                    <option value="id_desc" th:selected="${currentSort == 'id_desc'}">Новинки</option>
                                    <option value="price_asc" th:selected="${currentSort == 'price_asc'}">Цена: по возрастанию</option>
                                    <option value="price_desc" th:selected="${currentSort == 'price_desc'}">Цена: по убыванию</option>
                                </select>
                            </div>
                            <div class="col-md-4 d-flex align-items-end gap-2">
                                <button type="submit" class="btn btn-primary btn-sm rounded-pill flex-grow-1 fw-bold"><i class="bi bi-search"></i></button>
                                <a th:href="@{/admin/export/excel(keyword=${keyword}, category=${selectedCat}, minPrice=${minPrice}, maxPrice=${maxPrice}, sort=${currentSort})}" class="btn btn-success btn-sm rounded-pill px-3"><i class="bi bi-file-earmark-excel"></i></a>
                                <a href="/admin" class="btn btn-light btn-sm rounded-pill border"><i class="bi bi-arrow-clockwise"></i></a>
                            </div>
                        </form>
                    </div>

                    <div class="card admin-card p-0 overflow-hidden">
                        <table class="table table-hover align-middle mb-0" id="productsTable">
                            <thead class="table-light">
                            <tr>
                                <th class="ps-4">ID</th>
                                <th>Товар</th>
                                <th>Категория</th>
                                <th>Цена</th>
                                <th class="text-center">Действие</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="p : ${products}" th:id="'product-row-' + ${p.id}">
                                <td class="ps-4 text-muted" th:text="${'#' + p.id}"></td>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <img th:src="${p.imageUrl}" class="rounded shadow-sm me-3" style="width: 45px; height: 45px; object-fit: cover;">
                                        <div>
                                            <div class="fw-bold text-dark" th:text="${p.name}"></div>
                                            <div class="small text-muted" th:text="${#strings.abbreviate(p.description, 40)}"></div>
                                        </div>
                                    </div>
                                </td>
                                <td><span class="badge bg-light text-secondary border" th:text="${p.category}"></span></td>
                                <td><strong class="text-primary" th:text="${p.price + ' $'}"></strong></td>
                                <td class="text-center">
                                    <button class="btn btn-outline-danger btn-sm rounded-circle"
                                            th:onclick="'deleteProduct(' + ${p.id} + ')'"
                                            style="width: 32px; height: 32px; padding: 0;">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="orders-tab">
            <div class="card admin-card p-0 overflow-hidden">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4">№ Заказа</th><th>Дата</th><th>Клиент</th><th>Сумма</th><th>Статус</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="order : ${orders}">
                        <td class="ps-4 fw-bold" th:text="'#' + ${order.id}"></td>
                        <td class="small text-muted" th:text="${#temporals.format(order.orderDate, 'dd.MM.yyyy HH:mm')}"></td>
                        <td><div class="fw-bold" th:text="${order.user.fullName}"></div></td>
                        <td class="text-primary fw-bold" th:text="${order.totalAmount} + ' $'"></td>
                        <td><span class="badge rounded-pill px-3 bg-success-subtle text-success" th:text="${order.status}"></span></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.getElementById('addProductForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Останавливаем перезагрузку страницы

        const form = this;
        const formData = new FormData(form);
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');

        // Показываем загрузку
        submitBtn.disabled = true;
        btnText.classList.add('d-none');
        btnSpinner.classList.remove('d-none');

        fetch('/api/admin/products', {
            method: 'POST',
            body: formData // multipart/form-data устанавливается автоматически
        })
        .then(response => {
            if (response.ok) return response.json();
            throw new Error('Ошибка сервера');
        })
        .then(newProduct => {

            form.reset();
            window.location.reload();
        })
        .catch(error => {
            alert('Не удалось добавить товар: ' + error.message);
        })
        .finally(() => {
            submitBtn.disabled = false;
            btnText.classList.remove('d-none');
            btnSpinner.classList.add('d-none');
        });
    });

function deleteProduct(id) {
    if (!confirm('Вы уверены, что хотите безвозвратно удалить этот товар?')) return;

    fetch(`/api/admin/products/${id}`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' }
    })
    .then(async response => {
        if (response.status === 204) {
            // Сервер ответил No Content - успешно удалено.
            const row = document.getElementById(`product-row-${id}`);
            if (row) {
                row.classList.add('fade-out');
                setTimeout(() => row.remove(), 300);
            }
        }
        else if (response.status === 409) {
            // ОШИБКА БАЗЫ ДАННЫХ (Товар есть в заказах)
            const errorMessage = await response.text();
            alert('Внимание: ' + errorMessage);
        }
        else if (response.status === 403) {
            alert('Ошибка: У вас нет прав администратора!');
        }
        else {
            alert('Произошла ошибка при удалении товара.');
        }
    })
    .catch(error => console.error('Ошибка сети:', error));
}
    function generateDescription() {
    const name = document.querySelector('input[name="name"]').value;
    const descField = document.getElementById('descField');

    if (!name) return alert('Введите название товара!');

    descField.value = 'Генерация...';

    // Используем тот же контроллер чата, но с особым промптом
    fetch(`/api/chat/ask?message=${encodeURIComponent("Напиши продающее описание для " + name + " в 2 предложениях")}`)
        .then(r => r.text())
        .then(text => descField.value = text);
}
</script>


</body>
</html>
