name: ZAP Local Scan

on:
  push:
    branches:
      - master # Срабатывает при пуше в master

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Скачиваем твой код на сервер GitHub
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Устанавливаем Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Собираем и запускаем твой Spring Boot в фоновом режиме
      - name: Start Spring Boot app
        run: |
          ./mvnw clean package -DskipTests
          nohup java -jar target/*.jar &
          sleep 30 # Ждем 30 секунд, пока сервер полностью запустится

      # 4. Запускаем ZAP (он будет атаковать localhost сервера GitHub)
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080' # Сервер сканирует сам себя!
